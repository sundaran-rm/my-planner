   HABITS
   ======================================== */
function addHabit() {
  const text = document.getElementById('habitInp').value.trim();
  if (!text) return;
  const h = { id:uid(), name:text, freq:document.getElementById('habitFreq').value, completions:{}, ts:Date.now() };
  S.habits.push(h);
  persist('habits', h);
  document.getElementById('habitInp').value = '';
  renderHabits();
}

function toggleHabit(id) {
  const h = S.habits.find(x=>x.id===id);
  if (!h) return;
  const t = today();
  if (!h.completions) h.completions = {};
  h.completions[t] = !h.completions[t];
  persist('habits', h);
  renderHabits();
}

function deleteHabit(id) {
  S.habits = S.habits.filter(x=>x.id!==id);
  remove('habits', id);
  renderHabits();
}

function habitStreak(h) {
  let streak = 0, d = new Date();
  while (true) {
    const key = d.toISOString().slice(0,10);
    if (h.completions && h.completions[key]) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function renderHabits() {
  const el = document.getElementById('habitList');
  if (!S.habits.length) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">🌱</span><p>Add habits to track daily progress</p></div>`;
    return;
  }

  const days = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-6+i); return d.toISOString().slice(0,10); });
  const dayLabels = days.map(d=>{const dd=new Date(d+'T00:00:00');return['Su','Mo','Tu','We','Th','Fr','Sa'][dd.getDay()];});
  const t = today();

  el.innerHTML = S.habits.map(h=>{
    const streak = habitStreak(h);
    const dots = days.map((d,i)=>{
      const done = h.completions && h.completions[d];
      const cls = d>t?'future':done?'done':'missed';
      return `<div class="habit-dot-wrap"><div class="habit-dot ${cls}">${done?'✓':''}</div><div class="habit-day-label">${dayLabels[i]}</div></div>`;
    }).join('');
    const doneTd = h.completions && h.completions[t];
    return `
      <div class="habit-item">
        <div class="habit-header">
          <button class="habit-check-btn ${doneTd?'done':''}" onclick="toggleHabit('${h.id}')">${doneTd?'✓':'○'}</button>
          <div class="habit-name">${esc(h.name)}</div>
          <div class="habit-streak">🔥 ${streak}</div>
          <span class="habit-freq-badge">${h.freq}</span>
          <button class="habit-del-btn" onclick="deleteHabit('${h.id}')">✕</button>
        </div>
        <div class="habit-dots">${dots}</div>
      </div>`;
  }).join('');
}

/* ========================================
   CALENDAR
   ======================================== */
function calPrev() { S.calMonth--; if(S.calMonth<0){S.calMonth=11;S.calYear--;} renderCalendar(); }
function calNext() { S.calMonth++; if(S.calMonth>11){S.calMonth=0;S.calYear++;} renderCalendar(); }
function calGoToday() { S.calMonth=new Date().getMonth(); S.calYear=new Date().getFullYear(); S.calSel=today(); renderCalendar(); }

function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calTitle').textContent = `${months[S.calMonth]} ${S.calYear}`;

  const firstDay = new Date(S.calYear, S.calMonth, 1).getDay();
  const daysInMonth = new Date(S.calYear, S.calMonth+1, 0).getDate();
  const daysInPrev  = new Date(S.calYear, S.calMonth, 0).getDate();
  const t = today();

  const pColors = { high:'var(--red)', med:'var(--gold)', low:'var(--blue)' };

  const dayHdrs = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-hdr">${d}</div>`).join('');

  let cells = '';
  // Prev month padding
  for (let i=0;i<firstDay;i++) {
    cells += `<div class="cal-day other-month"><span class="cal-day-num">${daysInPrev-firstDay+1+i}</span></div>`;
  }
  // Current month
  for (let d=1;d<=daysInMonth;d++) {
    const dateStr = `${S.calYear}-${String(S.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const tasksDue = S.todos.filter(t=>t.due===dateStr&&!t.archived);
    const dots = tasksDue.slice(0,3).map(t=>`<div class="cal-dot" style="background:${pColors[t.priority]||'var(--ink2)'}"></div>`).join('');
    const isToday = dateStr === t;
    const isSel   = dateStr === S.calSel;
    cells += `<div class="cal-day ${isToday?'today':''} ${isSel&&!isToday?'selected':''}" onclick="calSelectDay('${dateStr}')">
      <span class="cal-day-num">${d}</span>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }
  // Remaining cells
  const total = firstDay + daysInMonth;
  const rem = total % 7 === 0 ? 0 : 7 - (total%7);
  for (let i=1;i<=rem;i++) cells += `<div class="cal-day other-month"><span class="cal-day-num">${i}</span></div>`;

  document.getElementById('calGrid').innerHTML = dayHdrs + cells;
  renderCalDay(S.calSel);
}

function calSelectDay(dateStr) {
  S.calSel = dateStr;
  renderCalendar();
}

function renderCalDay(dateStr) {
  const el = document.getElementById('calSelectedTasks');
  const tasks = S.todos.filter(t=>t.due===dateStr&&!t.archived);
  const d = new Date(dateStr+'T00:00:00');
  const label = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  if (!tasks.length) {
    el.innerHTML = `<div class="cal-sel-hdr">${label}</div><div style="font-style:italic;color:var(--ink3);font-size:.9rem;padding:8px 0">No tasks due</div>`;
    return;
  }
  el.innerHTML = `<div class="cal-sel-hdr">${label} — ${tasks.length} task${tasks.length!==1?'s':''}</div>` +
    tasks.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)">
      <button class="task-check ${t.done?'done':''}" onclick="toggleTask('${t.id}');renderCalendar()" style="flex-shrink:0"></button>
      <span style="font-family:'Caveat',cursive;font-size:1.05rem;${t.done?'text-decoration:line-through;opacity:.5':''}">${esc(t.text)}</span>
    </div>`).join('');
}

/* ========================================
   POMODORO
   ======================================== */
const POMO_DURATIONS = { work:25*60, break:5*60, long:15*60 };
const POMO_LABELS    = { work:'Focus Time', break:'Short Break', long:'Long Break' };
const POMO_COLORS    = { work:'var(--red)', break:'var(--green)', long:'var(--blue)' };

function setPomoMode(mode, el) {
  if (S.pomo.running) return;
  S.pomo.mode  = mode;
  S.pomo.total = POMO_DURATIONS[mode];
  S.pomo.left  = POMO_DURATIONS[mode];
  document.querySelectorAll('.pomo-mode-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pomoCircle').style.stroke = POMO_COLORS[mode];
  updatePomoDisplay();
}

function togglePomo() {
  const btn = document.getElementById('pomoStartBtn');
  if (S.pomo.running) {
    clearInterval(S.pomo.iv);
    S.pomo.running = false;
    btn.textContent = '▶ Resume';
  } else {
    S.pomo.running = true;
    btn.textContent = '⏸ Pause';
    S.pomo.iv = setInterval(pomoTick, 1000);
  }
}

function pomoTick() {
  S.pomo.left--;
  if (S.pomo.left <= 0) {
    clearInterval(S.pomo.iv);
    S.pomo.running = false;
    document.getElementById('pomoStartBtn').textContent = '▶ Start';
    S.pomo.sessions++;
    saveLocal();
    updatePomoDisplay();
    updatePomoSessionDots();
    pomoNotify();
    if (S.pomo.mode === 'work') launchConfetti();
    return;
  }
  updatePomoDisplay();
}

function resetPomo() {
  clearInterval(S.pomo.iv);
  S.pomo.running = false;
  S.pomo.left = S.pomo.total;
  document.getElementById('pomoStartBtn').textContent = '▶ Start';
  updatePomoDisplay();
}

function updatePomoDisplay() {
  const m = Math.floor(S.pomo.left / 60);
  const s = S.pomo.left % 60;
  document.getElementById('pomoTime').textContent = `${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('pomoModeLabel').textContent = POMO_LABELS[S.pomo.mode];
  const circ = 2 * Math.PI * 88;
  const offset = circ * (1 - S.pomo.left / S.pomo.total);
  document.getElementById('pomoCircle').style.strokeDashoffset = circ - offset;
}

function updatePomoSessionDots() {
  document.getElementById('pomoSessionCount').textContent = `Sessions today: ${S.pomo.sessions}`;
  document.getElementById('pomoSessionDots').innerHTML =
    Array.from({length:Math.min(S.pomo.sessions,8)},()=>`<div class="pomo-ses-dot done"></div>`).join('') +
    Array.from({length:Math.max(0,4-S.pomo.sessions)},()=>`<div class="pomo-ses-dot"></div>`).join('');
}

function pomoNotify() {
  const msgs = { work:'🍅 Focus session done! Time for a break.', break:'☕ Break over. Back to work!', long:'🎉 Long break done. Let\'s crush it!' };
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Planner Pro', { body: msgs[S.pomo.mode], icon: '🍅' });
  }
  showToastMsg(msgs[S.pomo.mode], false);
  document.title = 'Planner Pro'; // Reset tab title
}

function updatePomoTaskSelect() {
  const sel = document.getElementById('pomoTaskLink');
  const prev = sel.value;
  sel.innerHTML = `<option value="">🔗 Link to a task (optional)</option>` +
    S.todos.filter(t=>!t.done&&!t.archived).map(t=>`<option value="${t.id}">${esc(t.text.slice(0,50))}</option>`).join('');
  sel.value = prev;
}

/* ========================================
   NOTIFICATIONS
   ======================================== */
function requestNotif() {
  if (!('Notification' in window)) { showToastMsg('Notifications not supported', false); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      document.getElementById('notifBtn').textContent = '🔔';
      showToastMsg('Notifications enabled! ✓', false);
      scheduleNotifications();
    } else {
      showToastMsg('Notifications blocked', false);
    }
  });
}

function scheduleNotifications() {
  const now = new Date();
  S.todos.filter(t=>!t.done&&!t.archived&&t.due).forEach(t=>{
    const due = new Date(t.due + 'T09:00:00');
    const diff = due - now;
    if (diff > 0 && diff < 86400000) {
      setTimeout(()=>{
        new Notification('Planner Pro – Task Due', { body: t.text, icon: '📋' });
      }, diff);
    }
  });
}

   ARCHIVE
   ======================================== */
let archiveTab = 'tasks';

function openArchive() {
  renderArchive();
  document.getElementById('archiveOverlay').classList.add('open');
}

function closeArchive() { document.getElementById('archiveOverlay').classList.remove('open'); }

function renderArchive() {
  const body = document.getElementById('archiveBody');
  const tabHtml = `
    <div class="archive-tabs">
      <button class="chip ${archiveTab==='tasks'?'active':''}" onclick="archiveTab='tasks';renderArchive()">Tasks (${S.archTodos.length})</button>
      <button class="chip ${archiveTab==='notes'?'active':''}" onclick="archiveTab='notes';renderArchive()">Notes (${S.archNotes.length})</button>
    </div>`;

  if (archiveTab === 'tasks') {
    const items = S.archTodos.map(t=>`
      <div class="archive-item">
        <span class="archive-text">${esc(t.text)}</span>
        <button class="archive-restore" onclick="restoreTask('${t.id}')">Restore</button>
        <button class="archive-del-perm" onclick="permDeleteTask('${t.id}')">✕</button>
      </div>`).join('');
    body.innerHTML = tabHtml + (items || '<div style="text-align:center;padding:30px;opacity:.5;font-style:italic">Archive is empty</div>');
  } else {
    const items = S.archNotes.map(n=>`
      <div class="archive-item">
        <div>
          <span class="archive-text">${esc(n.title)}</span>
          <div style="font-size:.78rem;color:var(--ink3);font-style:italic">${esc(n.body.slice(0,50))}…</div>
        </div>
        <button class="archive-restore" onclick="restoreNote('${n.id}')">Restore</button>
        <button class="archive-del-perm" onclick="permDeleteNote('${n.id}')">✕</button>
      </div>`).join('');
    body.innerHTML = tabHtml + (items || '<div style="text-align:center;padding:30px;opacity:.5;font-style:italic">Archive is empty</div>');
  }
}

function restoreTask(id) {
  const idx = S.archTodos.findIndex(x=>x.id===id);
  if (idx<0) return;
  const t = {...S.archTodos[idx], archived:false};
  S.archTodos.splice(idx,1);
  S.todos.unshift(t);
  persist('todos',t);
  renderTasks(); renderArchive();
}

function permDeleteTask(id) {
  S.archTodos = S.archTodos.filter(x=>x.id!==id);
  saveLocal(); renderArchive();
}

function restoreNote(id) {
  const idx = S.archNotes.findIndex(x=>x.id===id);
  if (idx<0) return;
  const n = {...S.archNotes[idx], archived:false};
  S.archNotes.splice(idx,1);
  S.notes.unshift(n);
  persist('notes',n);
  renderNotes(); renderArchive();
}

function permDeleteNote(id) {
  S.archNotes = S.archNotes.filter(x=>x.id!==id);
  saveLocal(); renderArchive();
}

function showToast(msg) {
  document.getElementById('undoMsg').textContent = msg;
  const toast = document.getElementById('undoToast');
  toast.classList.add('show');
  clearTimeout(S.undoTimer);
  S.undoTimer = setTimeout(()=>toast.classList.remove('show'), 4000);
}

function showToastMsg(msg, withUndo=true) {
  if (!withUndo) {
    const toast = document.getElementById('undoToast');
    document.getElementById('undoMsg').textContent = msg;
    toast.querySelector('.toast-undo').style.display='none';
    toast.classList.add('show');
    clearTimeout(S.undoTimer);
    S.undoTimer = setTimeout(()=>{ toast.classList.remove('show'); toast.querySelector('.toast-undo').style.display=''; }, 3000);
  } else { showToast(msg); }
}

function undoDelete() {
  if (!S.undoData) return;
  const {type, item} = S.undoData;
  if (type==='task') { item.archived=false; S.todos.unshift(item); persist('todos',item); renderTasks(); }
  if (type==='note') { item.archived=false; S.notes.unshift(item); persist('notes',item); renderNotes(); }
  S.undoData = null;
  document.getElementById('undoToast').classList.remove('show');
}

/* ========================================
   CONFETTI
   ======================================== */
let confettiParticles = [];
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.pointerEvents = 'none';
  const colors = ['#c84b2f','#c9a84c','#2f6e8a','#2d7d46','#6b4b9a','#e5795f'];
  confettiParticles = Array.from({length:120},()=>({
    x: Math.random()*canvas.width, y: -10,
    w: 6+Math.random()*8, h: 4+Math.random()*4,
    color: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random()-0.5)*4, vy: 3+Math.random()*4,
    rot: Math.random()*360, rotV: (Math.random()-0.5)*6,
    alpha: 1
  }));
  animateConfetti(ctx, canvas);
}

function animateConfetti(ctx, canvas) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiParticles = confettiParticles.filter(p=>p.alpha>0);
  confettiParticles.forEach(p=>{
    p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.vy += 0.1;
    if (p.y > canvas.height*0.7) p.alpha -= 0.03;
    ctx.save();
    ctx.globalAlpha = Math.max(0,p.alpha);
    ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });
  if (confettiParticles.length) requestAnimationFrame(()=>animateConfetti(ctx,canvas));
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}

let CP = { hue: 10, sat: 72, lit: 47, dragging: false, open: false };

/* ========================================
   COLOR PICKER
   ======================================== */
const COLOR_PRESETS = [
  { name:'Crimson',  h:10,  s:72, l:47 },
  { name:'Amber',    h:35,  s:80, l:48 },
  { name:'Forest',   h:140, s:55, l:35 },
  { name:'Ocean',    h:205, s:65, l:38 },
  { name:'Violet',   h:265, s:55, l:45 },
  { name:'Rose',     h:340, s:65, l:50 },
  { name:'Teal',     h:175, s:60, l:35 },
  { name:'Slate',    h:220, s:35, l:42 },
];

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * c).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function drawColorWheel() {
  const canvas = document.getElementById('colorWheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 2;
  for (let angle = 0; angle < 360; angle++) {
    const startAngle = (angle - 1) * Math.PI / 180;
    const endAngle   = (angle + 1) * Math.PI / 180;
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    gradient.addColorStop(0,   `hsl(${angle}, 0%, 100%)`);
    gradient.addColorStop(0.5, `hsl(${angle}, 100%, 50%)`);
    gradient.addColorStop(1,   `hsl(${angle}, 100%, 20%)`);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
  }
  const centreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.18);
  centreGrad.addColorStop(0, 'rgba(255,255,255,1)');
  centreGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = centreGrad;
  ctx.fill();
}

function positionCursor() {
  const canvas = document.getElementById('colorWheel');
  const r = canvas.width / 2 - 2, cx = canvas.width / 2, cy = canvas.height / 2;
  const angle = (CP.hue - 90) * Math.PI / 180;
  const dist  = (CP.sat / 100) * r;
  const x = cx + dist * Math.cos(angle);
  const y = cy + dist * Math.sin(angle);
  const cursor = document.getElementById('cpCursor');
  cursor.style.left = x + 'px';
  cursor.style.top  = y + 'px';
  cursor.style.background = `hsl(${CP.hue}, ${CP.sat}%, ${CP.lit}%)`;
}

function updateCPPreview() {
  const color = `hsl(${CP.hue}, ${CP.sat}%, ${CP.lit}%)`;
  document.getElementById('cpPreview').style.background  = color;
  document.getElementById('cpApplyBtn').style.background = color;
  const slider = document.getElementById('cpBrightness');
  slider.style.background = `linear-gradient(to right,
    hsl(${CP.hue},${CP.sat}%,10%),
    hsl(${CP.hue},${CP.sat}%,50%),
    hsl(${CP.hue},${CP.sat}%,90%))`;
  document.getElementById('themeSwatchDot').style.background = color;
  positionCursor();
}

function renderCPPresets() {
  document.getElementById('cpPresets').innerHTML = COLOR_PRESETS.map(p => {
    const hex    = hslToHex(p.h, p.s, p.l);
    const active = Math.abs(p.h - CP.hue) < 15 ? 'active' : '';
    return `<div class="cp-preset ${active}" style="background:${hex}"
      onclick="selectPreset(${p.h},${p.s},${p.l})" title="${p.name}"></div>`;
  }).join('');
}

function selectPreset(h, s, l) {
  CP.hue = h; CP.sat = s; CP.lit = l;
  document.getElementById('cpBrightness').value = l;
  updateCPPreview(); renderCPPresets();
}

function onBrightnessChange() {
  CP.lit = parseInt(document.getElementById('cpBrightness').value);
  updateCPPreview(); renderCPPresets();
}

function wheelEventXY(e, canvas) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function applyWheelXY(x, y) {
  const canvas = document.getElementById('colorWheel');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 2;
  const dx = x - cx, dy = y - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  CP.sat = Math.round(Math.min(dist / r, 1) * 100);
  let hue = Math.atan2(dy, dx) * 180 / Math.PI + 90;
  if (hue < 0) hue += 360;
  CP.hue = Math.round(hue) % 360;
  updateCPPreview(); renderCPPresets();
}

function openColorPicker() {
  CP.open = true;
  document.getElementById('colorPickerOverlay').classList.add('open');
  drawColorWheel();
  document.getElementById('cpBrightness').value = CP.lit;
  updateCPPreview();
  renderCPPresets();

  const canvas = document.getElementById('colorWheel');
  // Pointer events (desktop)
  canvas.addEventListener('pointerdown', e => { CP.dragging = true; canvas.setPointerCapture(e.pointerId); const {x,y} = wheelEventXY(e,canvas); applyWheelXY(x,y); });
  canvas.addEventListener('pointermove', e => { if (!CP.dragging) return; const {x,y} = wheelEventXY(e,canvas); applyWheelXY(x,y); });
  canvas.addEventListener('pointerup',   () => CP.dragging = false);
  // Touch events (mobile)
  canvas.addEventListener('touchstart',  e => { e.preventDefault(); const {x,y} = wheelEventXY(e,canvas); applyWheelXY(x,y); }, { passive: false });
  canvas.addEventListener('touchmove',   e => { e.preventDefault(); const {x,y} = wheelEventXY(e,canvas); applyWheelXY(x,y); }, { passive: false });
}

function closeColorPicker() {
  document.getElementById('colorPickerOverlay').classList.remove('open');
  CP.open = false;
}

// Close on backdrop tap
document.getElementById('colorPickerOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeColorPicker();
});

function applyThemeColor(silent = false) {
  const isDark = document.documentElement.dataset.theme === 'dark';
  const h = CP.hue, s = CP.sat, l = CP.lit;
  const h2 = (h + 160) % 360;
  const root = document.documentElement;
  root.style.setProperty('--bg',      `hsl(${h}, ${Math.round(s*.25)}%, ${isDark?8:80}%)`);
  root.style.setProperty('--paper',   `hsl(${h}, ${Math.round(s*.18)}%, ${isDark?10:97}%)`);
  root.style.setProperty('--paper2',  `hsl(${h}, ${Math.round(s*.22)}%, ${isDark?14:93}%)`);
  root.style.setProperty('--paper3',  `hsl(${h}, ${Math.round(s*.22)}%, ${isDark?18:88}%)`);
  root.style.setProperty('--ink',     `hsl(${h}, ${Math.round(s*.6)}%, ${isDark?88:12}%)`);
  root.style.setProperty('--ink2',    `hsl(${h}, ${Math.round(s*.4)}%, ${isDark?60:38}%)`);
  root.style.setProperty('--ink3',    `hsl(${h}, ${Math.round(s*.3)}%, ${isDark?46:55}%)`);
  root.style.setProperty('--red',     `hsl(${h}, ${s}%, ${l}%)`);
  root.style.setProperty('--blue',    `hsl(${h2}, ${Math.round(s*.85)}%, ${isDark?55:38}%)`);
  root.style.setProperty('--gold',    `hsl(${(h+40)%360}, ${Math.round(s*.85)}%, ${isDark?58:48}%)`);
  root.style.setProperty('--green',   `hsl(${(h+120)%360}, ${Math.round(s*.75)}%, ${isDark?45:35}%)`);
  root.style.setProperty('--line',    `hsl(${h}, ${Math.round(s*.2)}%, ${isDark?22:86}%)`);
  root.style.setProperty('--shadow',  `hsla(${h}, ${Math.round(s*.5)}%, ${isDark?5:20}%, ${isDark?.45:.12})`);
  S.themeColor = { h, s, l };
  document.getElementById('themeSwatchDot').style.background = `hsl(${h},${s}%,${l}%)`;
  if (!silent) { saveLocal(); closeColorPicker(); showToastMsg('Theme updated ✓', false); }
}
